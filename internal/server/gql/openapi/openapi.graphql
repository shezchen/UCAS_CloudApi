scalar Decimal
scalar DecimalInput
scalar Time

type APIKey {
  id: ID!
  key: String!
  name: String!
  scopes: [String!]
  profiles: APIKeyProfiles
}

type APIKeyProfiles {
  activeProfile: String!
  profiles: [APIKeyProfile!]
}

type APIKeyProfile {
  name: String!
  modelMappings: [ModelMapping!]
  channelIDs: [Int!]
  channelTags: [String!]
  channelTagsMatchMode: ChannelTagsMatchMode
  modelIDs: [String!]
  quota: APIKeyQuota
  loadBalanceStrategy: String
}

type APIKeyQuota {
  requests: Int
  totalTokens: Int
  cost: Decimal
  period: APIKeyQuotaPeriod!
}

type APIKeyQuotaPeriod {
  type: APIKeyQuotaPeriodType!
  pastDuration: APIKeyQuotaPastDuration
  calendarDuration: APIKeyQuotaCalendarDuration
}

type APIKeyQuotaPastDuration {
  value: Int!
  unit: APIKeyQuotaPastDurationUnit!
}

type APIKeyQuotaCalendarDuration {
  unit: APIKeyQuotaCalendarDurationUnit!
}

type ModelMapping {
  from: String!
  to: String!
}

enum ChannelTagsMatchMode {
  any
  all
  none
}

enum APIKeyQuotaPeriodType {
  all_time
  past_duration
  calendar_duration
}

enum APIKeyQuotaPastDurationUnit {
  minute
  hour
  day
}

enum APIKeyQuotaCalendarDurationUnit {
  day
  month
}

input UpdateAPIKeyProfilesInput {
  activeProfile: String!
  profiles: [APIKeyProfileInput!]!
}

input APIKeyProfileInput {
  name: String!
  modelMappings: [ModelMappingInput!]
  channelIDs: [Int!]
  channelTags: [String!]
  channelTagsMatchMode: ChannelTagsMatchMode
  modelIDs: [String!]
  quota: APIKeyQuotaInput
  loadBalanceStrategy: String
}

input APIKeyQuotaInput {
  requests: Int
  totalTokens: Int
  cost: DecimalInput
  period: APIKeyQuotaPeriodInput!
}

input APIKeyQuotaPeriodInput {
  type: APIKeyQuotaPeriodType!
  pastDuration: APIKeyQuotaPastDurationInput
  calendarDuration: APIKeyQuotaCalendarDurationInput
}

input APIKeyQuotaPastDurationInput {
  value: Int!
  unit: APIKeyQuotaPastDurationUnit!
}

input APIKeyQuotaCalendarDurationInput {
  unit: APIKeyQuotaCalendarDurationUnit!
}

input ModelMappingInput {
  from: String!
  to: String!
}

input LoadApiKeyProfileTemplateInput {
  """
  Template to load. Provide exactly one of templateID or templateName;
  templateName resolves within the caller's own project.
  """
  templateID: ID
  templateName: String
  """
  Target API key. Provide exactly one of apiKeyID or apiKeyName;
  apiKeyName resolves among the caller's own keys.
  """
  apiKeyID: ID
  apiKeyName: String
}

extend type Mutation {
  createLLMAPIKey(name: String!): APIKey!
  """
  Updates the profiles of an API key. Provide exactly one of id or name;
  name resolves among the caller's own keys, where names are unique.
  """
  updateAPIKeyProfiles(id: ID, name: String, input: UpdateAPIKeyProfilesInput!): APIKey!
  loadApiKeyProfileTemplate(input: LoadApiKeyProfileTemplateInput!): APIKey!
}

extend type Query {
  """
  Returns an API key's details (id, key, name, scopes, profiles).
  Provide exactly one of id, key, or name; names resolve among the caller's own
  keys, and only keys inside the caller's own project are visible (requires the
  read_api_keys scope).
  """
  apiKey(id: ID, key: String, name: String): APIKey!

  """
  Returns quota usage for the profiles that have quota enabled on an API key.
  Provide exactly one of apiKeyId, key, or name; names resolve among the
  caller's own keys, and only keys inside the caller's own project are visible
  (requires the read_api_keys scope).
  """
  apiKeyQuotaUsages(apiKeyId: ID, key: String, name: String): [APIKeyProfileQuotaUsage!]!
}

type APIKeyProfileQuotaUsage {
  profileName: String!
  quota: APIKeyQuota!
  window: APIKeyQuotaWindow!
  usage: APIKeyQuotaUsage!
}

type APIKeyQuotaUsage {
  requestCount: Int!
  totalTokens: Int!
  totalCost: Decimal!
}

type APIKeyQuotaWindow {
  start: Time
  end: Time
}
